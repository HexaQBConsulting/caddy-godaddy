name: build-and-push

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  IMAGE: hexaqb/caddy-godaddy

jobs:
  # ---------------------------------------------------------------------------
  # Build each platform on its NATIVE runner (no QEMU emulation).
  # Each job pushes a manifest-less, digest-only image to Docker Hub.
  # The `merge` job below stitches the digests into a single multi-arch image.
  # ---------------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pinned versions from Dockerfile
        id: versions
        run: |
          caddy_version="$(grep -E '^ARG CADDY_VERSION=' Dockerfile | cut -d= -f2)"
          plugin_version="$(grep -E '^ARG CADDY_GODADDY_VERSION=' Dockerfile | cut -d= -f2)"
          echo "caddy_version=${caddy_version}" >> "$GITHUB_OUTPUT"
          echo "plugin_version=${plugin_version}" >> "$GITHUB_OUTPUT"
          echo "bundle_tag=${caddy_version}-godaddy-${plugin_version}" >> "$GITHUB_OUTPUT"

      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (labels only)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          labels: |
            com.hexaqb.caddy.version=${{ steps.versions.outputs.caddy_version }}
            com.hexaqb.caddy-dns-godaddy.version=${{ steps.versions.outputs.plugin_version }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          pull: true
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Combine the per-platform digests into a single multi-arch manifest and
  # publish all the human-facing tags.
  # ---------------------------------------------------------------------------
  merge:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pinned versions from Dockerfile
        id: versions
        run: |
          caddy_version="$(grep -E '^ARG CADDY_VERSION=' Dockerfile | cut -d= -f2)"
          plugin_version="$(grep -E '^ARG CADDY_GODADDY_VERSION=' Dockerfile | cut -d= -f2)"
          echo "caddy_version=${caddy_version}" >> "$GITHUB_OUTPUT"
          echo "plugin_version=${plugin_version}" >> "$GITHUB_OUTPUT"
          echo "bundle_tag=${caddy_version}-godaddy-${plugin_version}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.versions.outputs.caddy_version }},enable={{is_default_branch}}
            type=raw,value=${{ steps.versions.outputs.bundle_tag }},enable={{is_default_branch}}

      - name: Create multi-arch manifest and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect final image
        run: |
          docker buildx imagetools inspect ${IMAGE}:${{ steps.versions.outputs.bundle_tag }}
